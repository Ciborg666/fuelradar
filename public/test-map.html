<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Тест Яндекс.Карт</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=1f51f1c5-a3cf-474d-b85a-9a80dd9c1c06&lang=ru_RU" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script>
        ymaps.ready(function() {
            console.log('✅ API загружен, версия:', ymaps.version);
            
            var map = new ymaps.Map('map', {
                center: [53.7596, 87.1216],
                zoom: 13,
                controls: ['zoomControl']
            });
            
            console.log('✅ Карта создана');
            
            // Тест 1: Простая метка без пресетов
            var placemark1 = new ymaps.Placemark(
                [53.7596, 87.1216],
                { hintContent: 'Тест 1 - без пресетов' }
            );
            map.geoObjects.add(placemark1);
            console.log('✅ Метка 1 добавлена (без пресетов)');
            
            // Тест 2: Метка с пресетом
            try {
                var placemark2 = new ymaps.Placemark(
                    [53.7650, 87.1280],
                    { hintContent: 'Тест 2 - с пресетом' },
                    { preset: 'islands#blueIcon' }
                );
                map.geoObjects.add(placemark2);
                console.log('✅ Метка 2 добавлена (с пресетом)');
            } catch (e) {
                console.error('❌ Ошибка метки 2:', e);
            }
            
            // Тест 3: Метка с другим пресетом
            try {
                var placemark3 = new ymaps.Placemark(
                    [53.7520, 87.1150],
                    { hintContent: 'Тест 3 - circleIcon' },
                    { preset: 'islands#redCircleIcon' }
                );
                map.geoObjects.add(placemark3);
                console.log('✅ Метка 3 добавлена (circleIcon)');
            } catch (e) {
                console.error('❌ Ошибка метки 3:', e);
            }
        });
    </script>
</body>
</html>
